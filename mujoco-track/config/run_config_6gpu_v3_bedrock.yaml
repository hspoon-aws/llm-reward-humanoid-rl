# Run config v3 — 6-GPU, Amazon Bedrock Claude Opus 4.8 as the LLM.
#
# Two experiments in one run:
#   1. LLM SWAP: provider=bedrock, Claude Opus 4.8 instead of self-hosted
#      Qwen3-Coder. Tests whether a stronger model writes better reward
#      functions (the "is LLM quality the bottleneck?" question).
#   2. ALIVE-DOMINANT REWARD: standing_reward raised 0.5 -> 4.0 so being upright
#      is unambiguously net-positive per step regardless of the LLM's penalty
#      terms (see docs/lesson-fall-termination-needs-alive-dominant-reward.md).
#      Without this, terminate-on-fall created a "die fast" incentive.
#
# GPU 0 still hosts vLLM (left running), but this run does NOT use it — Bedrock
# is a managed endpoint, so no request lock and no GPU-0 contention. Training
# uses GPUs 2-7 as before.

# --- project ------------------------------------------------------------- #
project_tag: "humanoid-mujoco-poc-v3-bedrock"

# --- orchestration loop --------------------------------------------------- #
max_iterations: 10
selection_metric: success_rate

# --- language model: Amazon Bedrock Claude Opus 4.8 ----------------------- #
llm:
  provider: "bedrock"
  model: "us.anthropic.claude-opus-4-8"   # inference profile (Opus 4.x is profile-only)
  region: "us-west-2"
  max_retries: 6
  retry_backoff_s: 3.0
  request_timeout_s: 180.0
  temperature: 0.4
  max_tokens: 4096
  prompts_dir: "prompts"
  # endpoint is unused for bedrock but the loader requires it; keep a valid value.
  endpoint: "http://127.0.0.1:8000/v1"

# --- goal-reaching task --------------------------------------------------- #
goal:
  goal_position: [2.0, 0.0]
  success_radius_m: 0.75

# --- reward sandbox ------------------------------------------------------- #
sandbox:
  time_limit_s: 5.0
  max_invalid_retries: 3

# --- training (MJX + Brax PPO) -------------------------------------------- #
training:
  env_name: "H1JoystickGaitTracking"
  llm_gpu: 0
  training_gpus: [2, 3, 4, 5, 6, 7]
  num_envs: 8190                        # 6 * 1365
  oom_fallback_num_envs: 4092           # 6 * 682
  epochs: 40
  episode_length: 1000
  num_evals: 15
  learning_rate: 3.0e-4
  lr_reduction_factor: 0.5
  xla_python_client_mem_fraction: 0.7
  # --- balance-before-locomotion: alive signal now DOMINATES --- #
  fall_terminate: true
  fall_height_m: 0.6
  standing_reward: 4.0                   # raised from 0.5: upright must be net-positive

# --- evaluation ----------------------------------------------------------- #
evaluation:
  episodes: 8
  fall_threshold_s: 3.0
  min_progress_distance_m: 1.0
  time_to_goal_threshold_s: 12.0
  path_efficiency_threshold: 0.6
  secondary_metrics_enabled: true

# --- artifact persistence ------------------------------------------------- #
s3:
  bucket: "humanoid-from-scratch-123456789012"
  prefix: "runs-mujoco"
  region: "us-west-2"

# --- training-media capture ----------------------------------------------- #
capture:
  capture_interval_epochs: 100
  width: 1280
  height: 720
  env_subset_size: 4

# --- learning blog -------------------------------------------------------- #
blog:
  output_location: "runs-mujoco"
  output_format: "markdown"
  llm_narrative_enabled: true

# --- demo video ----------------------------------------------------------- #
video:
  width: 1920
  height: 1080
  fps: 30
